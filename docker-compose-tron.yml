version: '3'

services:
  tron-load-balancer:
    image: tron-load-balancer:latest
    ports:
      - "8080:8080"
    environment:
      - ENV_VAR1=value1
      - ENV_VAR2=value2
      - ENV_VAR3=value3
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:8080/health' ]
      interval: 30s
      timeout: 10s
      retries: 5
